<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 كأس العالم 2026 — بطولة العائلة</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
:root{
  --gold:#F5C518;--gold-d:#C8A000;--green:#1b5e20;--green2:#2e7d32;
  --dark:#0a0f0a;--dark2:#111811;--dark3:#1a211a;
  --text:#e8f5e9;--muted:#7a9b7c;--red:#e53935;--blue:#42a5f5;
  --win:#66bb6a;--exact:#ffd54f;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}
.hero{background:linear-gradient(160deg,#0a0f0a 0%,#0d2b0e 50%,#0a1a0b 100%);text-align:center;padding:24px 16px 16px;border-bottom:2px solid var(--gold);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(245,197,24,.08) 0%,transparent 70%)}
.trophy{font-size:44px;animation:float 3s ease-in-out infinite;display:block}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.hero h1{font-size:clamp(18px,5vw,30px);font-weight:900;color:var(--gold);margin:5px 0 2px}
.hero .sub{color:var(--muted);font-size:12px}
.hero-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(229,57,53,.15);border:1px solid rgba(229,57,53,.4);color:#ef5350;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.live-dot{width:6px;height:6px;background:#ef5350;border-radius:50%;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-info{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
#sync-badge{font-size:11px;transition:opacity 1.5s}
.refresh-btn{background:rgba(245,197,24,.1);border:1px solid rgba(245,197,24,.25);color:var(--gold);font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;cursor:pointer}
.tabs{display:flex;background:var(--dark2);border-bottom:1px solid #1e2e1e;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{flex:1;min-width:60px;padding:12px 8px;background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(245,197,24,.04)}
.content{max-width:680px;margin:0 auto;padding:14px 12px 50px}
.section{display:none}.section.active{display:block}
.card{background:var(--dark2);border:1px solid #1e2e1e;border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
.fg input,.fg select{width:100%;background:var(--dark3);border:1px solid #2a3a2a;border-radius:8px;padding:9px 11px;color:var(--text);font-family:'Cairo',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.fg input:focus,.fg select:focus{border-color:var(--gold)}
.fg select option{background:var(--dark2)}
.btn{width:100%;padding:10px;border:none;border-radius:8px;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:var(--gold-d);transform:translateY(-1px)}
.member-item{display:flex;align-items:center;gap:9px;padding:10px 11px;background:var(--dark3);border-radius:10px;margin-bottom:6px;border:1px solid #1e2e1e}
.mflag{font-size:20px}.minfo{flex:1}.mname{font-weight:700;font-size:13px}.mteam{font-size:11px;color:var(--muted)}
.mpts{font-weight:900;font-size:16px;color:var(--gold);text-align:center;min-width:40px}.mpts span{font-size:10px;color:var(--muted);display:block}
.del-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;padding:3px;opacity:.4;transition:opacity .2s}.del-btn:hover{opacity:1}
/* MATCH */
.mc{background:var(--dark2);border:1px solid #1e2e1e;border-radius:12px;margin-bottom:10px;overflow:hidden}
.mc-head{background:var(--dark3);padding:7px 12px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--muted);border-bottom:1px solid #1e2e1e;gap:5px}
.phase-tag{background:rgba(245,197,24,.1);color:var(--gold);padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.group-tag{background:rgba(102,187,106,.1);color:var(--win);padding:2px 6px;border-radius:20px;font-size:10px;font-weight:700}
.auto-tag{background:rgba(66,165,245,.12);color:var(--blue);padding:2px 6px;border-radius:20px;font-size:10px;font-weight:700;display:inline-flex;align-items:center;gap:3px}
.mc-teams{display:flex;align-items:center;justify-content:space-between;padding:12px;gap:8px}
.tside{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.tflag{font-size:28px}.tname{font-size:11px;font-weight:700;text-align:center;line-height:1.2}
.vs-box{display:flex;flex-direction:column;align-items:center;gap:2px}
.vs{background:var(--green);color:var(--gold);font-weight:900;font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--green2)}
.live-score{font-size:24px;font-weight:900;color:var(--win);text-align:center;padding:2px 10px;line-height:1}
.live-label{font-size:9px;color:#ef5350;font-weight:700;animation:pulse 1s ease-in-out infinite}
.final-score{font-size:22px;font-weight:900;color:var(--exact);text-align:center;padding:2px 10px}
.pred-wrap{padding:0 12px 12px}
.pred-row{display:flex;align-items:center;gap:6px;justify-content:center;margin-bottom:7px}
.sinp{width:44px;text-align:center;background:var(--dark3);border:2px solid #2a3a2a;border-radius:8px;padding:7px 3px;color:var(--text);font-family:'Cairo',sans-serif;font-size:17px;font-weight:900;outline:none;transition:border-color .2s}
.sinp:focus{border-color:var(--gold)}
.ssep{font-size:17px;font-weight:900;color:var(--muted)}
.pred-for select{width:100%;background:var(--dark3);border:1px solid #2a3a2a;border-radius:8px;padding:7px 10px;color:var(--text);font-family:'Cairo',sans-serif;font-size:13px;outline:none;margin-bottom:7px}
.pred-btn{width:100%;padding:8px;background:var(--green);border:1px solid var(--green2);border-radius:8px;color:var(--gold);font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s}
.pred-btn:hover{background:var(--green2)}
.plist{padding:0 12px 10px;border-top:1px solid #1e2e1e}
.plist-title{font-size:10px;color:var(--muted);padding-top:8px;margin-bottom:5px}
.pitem{display:flex;justify-content:space-between;align-items:center;background:var(--dark3);border-radius:6px;padding:5px 8px;margin-bottom:3px;font-size:11px;gap:5px}
.pscore{font-weight:700;font-size:12px;white-space:nowrap}
.pbadge{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:700;white-space:nowrap}
.b-exact{background:rgba(255,213,79,.15);color:var(--exact)}
.b-win{background:rgba(102,187,106,.15);color:var(--win)}
.b-none{background:rgba(122,155,124,.08);color:var(--muted)}
.b-pend{background:rgba(66,165,245,.1);color:var(--blue)}
.res-area{background:rgba(245,197,24,.04);border-top:1px solid rgba(245,197,24,.15);padding:10px 12px}
.res-title{font-size:11px;color:var(--gold);font-weight:700;margin-bottom:6px}
.res-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.res-row .sinp{width:40px;font-size:15px;padding:6px 3px}
.save-res{flex:1;min-width:80px;padding:7px;background:var(--gold);border:none;border-radius:8px;color:#000;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.res-done{background:rgba(102,187,106,.08);border:1px solid rgba(102,187,106,.25);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--win);display:flex;align-items:center;gap:6px;font-weight:700;flex-wrap:wrap}
.edit-res{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:0;margin-right:auto}
/* LEADERBOARD */
.lb-item{display:flex;align-items:center;gap:10px;padding:12px 13px;background:var(--dark2);border:1px solid #1e2e1e;border-radius:10px;margin-bottom:6px;transition:transform .2s}
.lb-item:hover{transform:translateX(-2px)}
.lb-item.r1{border-color:var(--gold);background:rgba(245,197,24,.06)}
.lb-item.r2{border-color:#90a4ae}.lb-item.r3{border-color:#a1887f}
.rnum{font-size:16px;font-weight:900;min-width:26px;text-align:center}
.r1 .rnum{color:var(--gold)}.r2 .rnum{color:#90a4ae}.r3 .rnum{color:#a1887f}
.rflag{font-size:22px}.rinfo{flex:1}
.rname{font-weight:700;font-size:13px}.rteam{font-size:11px;color:var(--muted)}
.rstats{font-size:10px;margin-top:2px;display:flex;gap:4px;flex-wrap:wrap}
.rbadge{background:rgba(245,197,24,.08);border:1px solid rgba(245,197,24,.2);color:var(--gold);font-size:10px;font-weight:700;padding:1px 6px;border-radius:12px}
.rpts{text-align:center}.rpts .pn{font-size:20px;font-weight:900;color:var(--gold);line-height:1}.rpts .pl{font-size:10px;color:var(--muted)}
.filter-bar{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.filter-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid #2a3a2a;background:var(--dark3);color:var(--muted);font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-btn.active{background:rgba(245,197,24,.1);border-color:var(--gold);color:var(--gold)}
.empty{text-align:center;padding:30px 20px;color:var(--muted)}
.empty-icon{font-size:32px;margin-bottom:7px}.empty-text{font-size:13px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--dark3);border:1px solid var(--gold);color:var(--gold);padding:9px 20px;border-radius:28px;font-weight:700;font-size:13px;transition:transform .3s;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.pts-info{background:var(--dark3);border:1px solid #1e2e1e;border-radius:10px;padding:11px 12px;margin-bottom:12px;display:flex;gap:12px;justify-content:center}
.pts-box{text-align:center}.pts-box .pv{font-size:18px;font-weight:900;color:var(--gold)}.pts-box .pk{font-size:10px;color:var(--muted);margin-top:2px}
.divider{border:none;border-top:1px solid #1e2e1e;margin:12px 0}
.status-ok{background:rgba(102,187,106,.08);border:1px solid rgba(102,187,106,.25);border-radius:8px;padding:8px 11px;font-size:12px;color:var(--win);margin-bottom:12px}
.status-warn{background:rgba(239,83,80,.06);border:1px solid rgba(239,83,80,.2);border-radius:8px;padding:8px 11px;font-size:12px;color:#ef9a9a;margin-bottom:12px}
.countdown-open{background:rgba(102,187,106,.1);border:1px solid rgba(102,187,106,.3);border-radius:8px;padding:6px 10px;font-size:11px;color:var(--win);font-weight:700;text-align:center;margin:0 12px 10px}
.countdown-soon{background:rgba(255,213,79,.1);border:1px solid rgba(255,213,79,.3);border-radius:8px;padding:6px 10px;font-size:11px;color:var(--exact);font-weight:700;text-align:center;margin:0 12px 10px}
.countdown-closed{background:rgba(239,83,80,.08);border:1px solid rgba(239,83,80,.2);border-radius:8px;padding:6px 10px;font-size:11px;color:#ef9a9a;font-weight:700;text-align:center;margin:0 12px 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-sm{width:10px;height:10px;border:2px solid #2a3a2a;border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
</style>
</head>
<body>

  </div>
</div>

<!-- شريط الأدمن السري -->
<div id="admin-bar" style="display:none;background:#1a1a0a;border-bottom:2px solid #F5C518;padding:10px 16px;gap:8px;justify-content:center;flex-wrap:wrap;align-items:center">

  <button onclick="document.getElementById('admin-bar').style.display='none'" style="background:transparent;border:1px solid #555;border-radius:8px;padding:8px 12px;font-family:Cairo,sans-serif;font-size:12px;color:#aaa;cursor:pointer">إلغاء</button>
</div>

<div class="tabs">

</div>

  </div>

    <div id="matches-list"></div>
  </div>

</div>

<div style="text-align:center;padding:12px;border-top:1px solid #1e2e1e;margin-top:4px">

</div>
  <div style="background:#1a211a;border:2px solid #F5C518;border-radius:16px;padding:28px 20px;width:100%;max-width:320px;text-align:center;margin:80px auto 0">

    <div style="font-size:17px;font-weight:700;color:#F5C518;margin-bottom:18px">دخول الأدمن</div>

</div>

<div class="toast" id="toast"></div>

// TIME UTILS — بتوقيت الكويت (+3)
// ============================================================
function getMatchDateTime(match){
  if(!match.date || !match.time) return null;
  // نبني التاريخ والوقت بتوقيت الكويت UTC+3
  const [y,mo,d] = match.date.split('-').map(Number);
  const [h,m] = match.time.split(':').map(Number);
  // نحول من Kuwait time (UTC+3) لـ UTC
  return new Date(Date.UTC(y, mo-1, d, h-3, m));
}

function getCountdown(match){
  const dt = getMatchDateTime(match);
  if(!dt) return null;
  const now = Date.now();
  const diff = dt.getTime() - now;
  return diff; // milliseconds (negative = انتهت)
}

function isMatchLocked(match){
  // يُغلق التخمين عند بداية المباراة
  return getCountdown(match) <= 0;
}

function formatCountdown(ms){
  if(ms <= 0) return null;
  const totalSecs = Math.floor(ms / 1000);
  const days  = Math.floor(totalSecs / 86400);
  const hours = Math.floor((totalSecs % 86400) / 3600);
  const mins  = Math.floor((totalSecs % 3600) / 60);
  const secs  = totalSecs % 60;
  if(days > 0)  return `${days} يوم و ${hours} ساعة`;
  if(hours > 0) return `${hours}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  return `${mins}:${String(secs).padStart(2,'0')}`;
}

function fmtMatchTime(match){
  if(!match.time) return '';
  return match.time + ' (الكويت)';
}

const FB_BASE = 'https://family-worldcup-a5293-default-rtdb.firebaseio.com';
const FB_PATH = '/wc26';

function fbUrl(path){ return `${FB_BASE}${path}.json`; }

function syncBadge(status){
  const b=document.getElementById('sync-badge');
  if(!b)return;
  const m={saving:'⏫ جاري الحفظ…',loading:'⏬ تحميل…',ok:'✅ محفوظ',err:'⚠️ لا اتصال'};
  const c={saving:'#42a5f5',loading:'#42a5f5',ok:'#66bb6a',err:'#ef5350'};
  b.textContent=m[status]; b.style.color=c[status]; b.style.opacity='1';
  if(status==='ok') setTimeout(()=>b.style.opacity='0',2500);
}

async function fbFetch(path, options={}){
  const url = fbUrl(path);
  const res = await fetch(url, {
    ...options,
    headers: { 'Content-Type': 'application/json', ...(options.headers||{}) }
  });
  if(!res.ok) throw new Error('HTTP '+res.status);
  return res.json();
}

async function cloudSave(){
  syncBadge('saving');
  try{
    const membersObj = {};
    state.members.forEach(m => { membersObj['m'+m.id] = m; });
    await fbFetch(FB_PATH, {
      method: 'PUT',
      body: JSON.stringify({ members: membersObj, results: state.results, predictions: state.predictions })
    });
    syncBadge('ok');
  }catch(e){
    syncBadge('err');
    console.error('save error:', e);
  }
}

async function cloudLoad(){
  syncBadge('loading');
  for(let attempt=1; attempt<=3; attempt++){
    try{
      const data = await fbFetch(FB_PATH);
      if(!data){ syncBadge('ok'); return; }
      // members
      if(data.members){
        state.members = Array.isArray(data.members)
          ? data.members.filter(Boolean)
          : Object.values(data.members).filter(Boolean);
      }
      // results
      state.results = {};
      if(data.results) Object.entries(data.results).forEach(([k,v])=>{
        state.results[parseInt(k)||k] = v;
      });
      // predictions
      state.predictions = {};
      if(data.predictions) Object.entries(data.predictions).forEach(([k,v])=>{
        const id = parseInt(k)||k;
        state.predictions[id] = Array.isArray(v) ? v.filter(Boolean) : Object.values(v).filter(Boolean);
      });
      syncBadge('ok');
      return;
    }catch(e){
      console.error(`load attempt ${attempt}:`, e);
      if(attempt < 3) await new Promise(r=>setTimeout(r, 1500));
      else syncBadge('err');
    }
  }
}

// مراقبة التغييرات اللحظية عبر Firebase SSE
function startRealtimeSync(){
  try{
    const es = new EventSource(`${FB_BASE}${FB_PATH}.json`);
    es.addEventListener('put', e=>{
      try{
        const d = JSON.parse(e.data).data;
        if(!d) return;
        if(d.members){
          state.members = Array.isArray(d.members)
            ? d.members.filter(Boolean)
            : Object.values(d.members).filter(Boolean);
        }
        if(d.results) Object.entries(d.results).forEach(([k,v])=>{ state.results[parseInt(k)||k]=v; });
        if(d.predictions) Object.entries(d.predictions).forEach(([k,v])=>{
          const id=parseInt(k)||k;
          state.predictions[id]=Array.isArray(v)?v.filter(Boolean):Object.values(v).filter(Boolean);
        });
        recalcPoints(); renderAll(); syncBadge('ok');
      }catch(err){ console.error('SSE parse:', err); }
    });
    es.addEventListener('patch', e=>{
      try{ cloudLoad().then(()=>{ recalcPoints(); renderAll(); }); }catch(err){}
    });
    es.onerror = ()=>{ syncBadge('err'); };
  }catch(e){ console.error('SSE init:', e); }
}

  const relevant = MATCHES.filter(m=>{
    if(!m.date || !m.time) return false;
    if(state.results[m.id]) return false;
    const dt = getMatchDateTime(m);
    if(!dt) return false;
    const diffMs = now - dt.getTime();
    // المباراة انتهت: مضت أكثر من ساعتين (7200000ms) ولم تمضِ أكثر من 4 أيام
    return diffMs > 7200000 && diffMs < 4 * 86400000;
  });

  if(!relevant.length){
    if(aiStatus) aiStatus.textContent = `آخر تحديث: ${new Date().toLocaleTimeString('ar-KW')}`;
    return;
  }

  if(aiStatus) aiStatus.innerHTML = '<span class="spinner-sm"></span> جاري البحث عن نتائج جديدة…';

  const today = new Date();
  const matchList = relevant.map(m=>`id=${m.id}: ${m.t1} vs ${m.t2} on ${m.date}`).join('\n');
  const userPrompt = `Search the web for the FINAL scores of these FIFA World Cup 2026 matches that have already been played:
${matchList}

Today is ${today.toISOString().split('T')[0]}.
Return ONLY a raw JSON array, no markdown, no explanation:
[{"id":1,"s1":2,"s2":0},{"id":2,"s1":1,"s2":1}]
Only include matches with confirmed FINAL results. If a match has not finished, skip it.`;

  try{
    // المرحلة 1: أرسل الطلب مع أداة البحث
    const resp1 = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:2000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user', content: userPrompt}]
      })
    });
    if(!resp1.ok) throw new Error('API '+resp1.status);
    const data1 = await resp1.json();

    // فحص إذا رجع نص مباشرة بدون tool_use
    let finalText = (data1.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');

    // إذا احتاج tool_use، نكمل المحادثة
    if(data1.stop_reason === 'tool_use'){
      // نجمع كل tool_use blocks ونبني tool_result لكل واحدة
      const toolResults = (data1.content||[])
        .filter(b=>b.type==='tool_use')
        .map(b=>({
          type:'tool_result',
          tool_use_id: b.id,
          content: 'Search completed successfully. Please provide the JSON results now.'
        }));

      const resp2 = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:'claude-sonnet-4-6',
          max_tokens:1000,
          tools:[{type:'web_search_20250305',name:'web_search'}],
          messages:[
            {role:'user', content: userPrompt},
            {role:'assistant', content: data1.content},
            {role:'user', content: toolResults}
          ]
        })
      });
      if(!resp2.ok) throw new Error('API2 '+resp2.status);
      const data2 = await resp2.json();
      finalText = (data2.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');

      // إذا احتاج tool_use مرة ثانية (نادر)، نأخذ أي نص موجود
      if(data2.stop_reason === 'tool_use'){
        finalText = (data2.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
      }
    }

    // استخرج الـ JSON من النص
    const jsonMatch = finalText.match(/\[[\s\S]*?\]/);
    if(jsonMatch){
      const results = JSON.parse(jsonMatch[0]);
      let updated = 0;
      results.forEach(r=>{
        if(typeof r.id==='number' && typeof r.s1==='number' && typeof r.s2==='number'){
          if(!state.results[r.id]){ // لا نكتب فوق نتائج أدخلها الأدمن
            state.results[r.id] = {s1:r.s1, s2:r.s2, auto:true};
            updated++;
          }
        }
      });
      if(updated > 0){ save(); renderAll(); toast(`🤖 ${updated} نتيجة جديدة`); }
    }

    if(aiStatus) aiStatus.textContent = `آخر تحديث: ${new Date().toLocaleTimeString('ar-KW')}`;
  }catch(e){
    console.error('fetchLiveResults:', e);
    if(aiStatus) aiStatus.textContent = `⚠️ سيعاد المحاولة — ${new Date().toLocaleTimeString('ar-KW')}`;
  }
  lastAIFetch = Date.now();
}

function startAutoRefresh(){
  if(autoInterval) clearInterval(autoInterval);
  // كل دقيقة: تحقق إذا في مباريات انتهت وتحتاج نتائج
  autoInterval = setInterval(()=>{ fetchLiveResults(); }, 60*1000);
  fetchLiveResults();
}

// ============================================================
// MEMBERS
// ============================================================
function addMember(){
  const name=document.getElementById('inp-name').value.trim();
  const team=document.getElementById('inp-team').value;
  if(!name){toast('❗ أدخل الاسم');return;}
  if(!team){toast('❗ اختر المنتخب');return;}
  if(state.members.find(m=>m.name===name)){toast('⚠️ الاسم موجود مسبقاً');return;}
  state.members.push({id:Date.now(),name,team,points:0,exact:0,win:0});
  document.getElementById('inp-name').value='';
  renderAll();
  toast('✅ أُضيف '+name);
  cloudSave();
}
function deleteMember(id){
  if(!confirm('حذف هذا العضو؟'))return;
  state.members=state.members.filter(m=>m.id!==id);
  Object.values(state.predictions).forEach(a=>{const i=a.findIndex(p=>p.memberId===id);if(i>=0)a.splice(i,1);});
  save(); renderAll();
}

// ============================================================
// PREDICTIONS & RESULTS
// ============================================================
function savePred(matchId){
  const match = MATCHES.find(m=>m.id===matchId);
  if(match && isMatchLocked(match)){ toast('🔒 أُغلق باب التخمين'); return; }
  const s1=parseInt(document.getElementById('ps1-'+matchId).value);
  const s2=parseInt(document.getElementById('ps2-'+matchId).value);
  const memberId=parseInt(document.getElementById('pmem-'+matchId).value);
  if(isNaN(s1)||isNaN(s2)||s1<0||s2<0){toast('❗ أدخل نتيجة صحيحة');return;}
  if(!memberId){toast('❗ اختر عضوًا');return;}
  if(!state.predictions[matchId])state.predictions[matchId]=[];
  const idx=state.predictions[matchId].findIndex(p=>p.memberId===memberId);
  if(idx>=0)state.predictions[matchId][idx]={memberId,s1,s2};
  else state.predictions[matchId].push({memberId,s1,s2});
  save(); renderAll(); toast('✅ تم حفظ التوقع');
}
function saveResult(matchId){
  const s1=parseInt(document.getElementById('rs1-'+matchId).value);
  const s2=parseInt(document.getElementById('rs2-'+matchId).value);
  if(isNaN(s1)||isNaN(s2)||s1<0||s2<0){toast('❗ أدخل النتيجة');return;}
  state.results[matchId]={s1,s2,auto:false};
  save(); renderAll(); toast('🎉 تم تسجيل النتيجة!');
}
function editResult(matchId){
  delete state.results[matchId]; save(); renderAll();
}

// ============================================================
// RECALC POINTS
// ============================================================
function recalcPoints(){
  state.members.forEach(m=>{m.points=0;m.exact=0;m.win=0;});
  MATCHES.forEach(match=>{
    const r=state.results[match.id]; if(!r)return;
    (state.predictions[match.id]||[]).forEach(p=>{
      const mem=state.members.find(m=>m.id===p.memberId);if(!mem)return;
      if(p.s1===r.s1&&p.s2===r.s2){mem.points+=5;mem.exact++;}
      else if((p.s1>p.s2&&r.s1>r.s2)||(p.s1<p.s2&&r.s1<r.s2)||(p.s1===p.s2&&r.s1===r.s2)){mem.points+=3;mem.win++;}
    });
  });
}

// ============================================================
// UTILS
// ============================================================
function getFlag(n){return TEAMS.find(t=>t.n===n)?.f||'🏳️';}
function toast(msg){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}
function fmtDate(d){if(!d)return'';const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('ar-KW',{month:'short',day:'numeric'});}
function showTab(tab,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  if(btn)btn.classList.add('active');
  renderAll();
}
function setFilter(p){curFilter=p;renderMatches();}

// ============================================================
// RENDER — LEADERBOARD
// ============================================================
function renderLeaderboard(){
  const el=document.getElementById('lb-list');
  if(!state.members.length){el.innerHTML='<div class="empty"><div class="empty-icon">🏆</div><div class="empty-text">أضف أفراد العائلة من تبويب الأعضاء!</div></div>';return;}
  const medals=['🥇','🥈','🥉'];
  el.innerHTML=[...state.members].sort((a,b)=>b.points-a.points).map((m,i)=>`
    <div class="lb-item ${i<3?'r'+(i+1):''}">
      <div class="rnum">${medals[i]||(i+1)}</div>
      <div class="rflag">${getFlag(m.team)}</div>
      <div class="rinfo">
        <div class="rname">${m.name}</div>
        <div class="rteam">📣 ${m.team}</div>
        <div class="rstats">
          ${m.exact>0?`<span class="rbadge">🎯 ${m.exact} كاملة</span>`:''}
          ${m.win>0?`<span class="rbadge">✅ ${m.win} فائز</span>`:''}
          ${!m.exact&&!m.win?'<span style="color:var(--muted)">لا توقعات بعد</span>':''}
        </div>
      </div>
      <div class="rpts"><div class="pn">${m.points}</div><div class="pl">نقطة</div></div>
    </div>`).join('');
}

// ============================================================
// RENDER — MEMBERS
// ============================================================
function renderMembers(){
  const sel=document.getElementById('inp-team');
  sel.innerHTML='<option value="">— اختر المنتخب —</option>'+TEAMS.map(t=>`<option value="${t.n}">${t.f} ${t.n}</option>`).join('');
  const el=document.getElementById('members-list');
  if(!state.members.length){el.innerHTML='<div class="empty"><div class="empty-icon">👥</div><div class="empty-text">لا يوجد أعضاء بعد</div></div>';return;}
  el.innerHTML=state.members.map(m=>`
    <div class="member-item">
      <div class="mflag">${getFlag(m.team)}</div>
      <div class="minfo"><div class="mname">${m.name}</div><div class="mteam">${m.team}</div></div>
      <div class="mpts">${m.points}<span>نقطة</span></div>
      ${isAdmin ? `<button class="del-btn" onclick="deleteMember(${m.id})">🗑️</button>` : ''}
    </div>`).join('');
}

// ============================================================
// RENDER — MATCHES
// ============================================================
function renderMatches(){
  const phases=['دور المجموعات','دور الـ32','دور الـ16','ربع النهائي','نصف النهائي','النهائي'];
  document.getElementById('phase-filter').innerHTML=phases.map(p=>`<button class="filter-btn ${curFilter===p?'active':''}" onclick="setFilter('${p}')">${p}</button>`).join('');
  const filtered=MATCHES.filter(m=>m.phase===curFilter||(curFilter==='النهائي'&&(m.phase==='النهائي'||m.phase==='المركز الثالث')));
  const el=document.getElementById('matches-list');
  if(!filtered.length){el.innerHTML='<div class="empty"><div class="empty-icon">⚽</div><div class="empty-text">لا مباريات في هذه المرحلة</div></div>';return;}
  const memberOpts=state.members.map(m=>`<option value="${m.id}">${getFlag(m.team)} ${m.name}</option>`).join('');
  el.innerHTML=filtered.map(match=>{
    const res=state.results[match.id];
    const preds=state.predictions[match.id]||[];
    const predRows=preds.map(p=>{
      const mem=state.members.find(m=>m.id===p.memberId);if(!mem)return'';
      let badge='',bc='b-pend';
      if(res){
        if(p.s1===res.s1&&p.s2===res.s2){badge='🎯 +5 كاملة';bc='b-exact';}
        else if((p.s1>p.s2&&res.s1>res.s2)||(p.s1<p.s2&&res.s1<res.s2)||(p.s1===p.s2&&res.s1===res.s2)){badge='✅ +3 فائز';bc='b-win';}
        else{badge='❌ لا نقاط';bc='b-none';}
      }else{badge='⏳ انتظار';bc='b-pend';}
      return`<div class="pitem"><span>${getFlag(mem.team)} ${mem.name}</span><span class="pscore">${p.s1}–${p.s2}</span><span class="pbadge ${bc}">${badge}</span></div>`;
    }).join('');

    const scoreBox = res
      ? `<div class="final-score">${res.s1} — ${res.s2}</div>`
      : `<div class="vs">VS</div>`;

    const autoLabel = res?.auto ? `<span class="auto-tag">🤖 تلقائي</span>` : '';

    const locked = isMatchLocked(match);
    const countdown = getCountdown(match);
    const cdMs = countdown || 0;

    // شريط العد التنازلي
    let countdownBar = '';
    if(!res && !locked && cdMs > 0){
      const cdText = formatCountdown(cdMs);
      const cls = cdMs < 3600000 ? 'countdown-soon' : 'countdown-open'; // أقل من ساعة = أصفر
      countdownBar = `<div class="${cls}" id="cd-${match.id}">⏱️ يُغلق التخمين بعد: ${cdText}</div>`;
    } else if(!res && locked){
      countdownBar = `<div class="countdown-closed">🔒 أُغلق باب التخمين — المباراة بدأت</div>`;
    }

    const resSection = res
      ? `<div class="res-done">${getFlag(match.t1)} ${res.s1} — ${res.s2} ${getFlag(match.t2)}
          ${isAdmin ? `<button class="edit-res" onclick="editResult(${match.id})">✏️ تعديل</button>` : ''}
        </div>`
      : isAdmin ? `<div class="res-area">
          <div class="res-title">📝 تسجيل النتيجة (أدمن فقط)</div>
          <div class="res-row">
            <span style="font-size:11px;color:var(--muted)">${getFlag(match.t1)}</span>
            <input class="sinp" type="number" id="rs1-${match.id}" value="1" min="0" max="30">
            <span class="ssep">—</span>
            <input class="sinp" type="number" id="rs2-${match.id}" value="0" min="0" max="30">
            <span style="font-size:11px;color:var(--muted)">${getFlag(match.t2)}</span>
            <button class="save-res" onclick="saveResult(${match.id})">💾 حفظ</button>
          </div>
        </div>` : '';

    // التخمين — يُغلق لما تبدأ المباراة
    const predSection = state.members.length > 0 && !res && !locked ? `
      <div class="pred-wrap">
        <div class="pred-row">
          <span style="font-size:11px;color:var(--muted)">${getFlag(match.t1)}</span>
          <input class="sinp" type="number" id="ps1-${match.id}" value="1" min="0" max="30">
          <span class="ssep">–</span>
          <input class="sinp" type="number" id="ps2-${match.id}" value="0" min="0" max="30">
          <span style="font-size:11px;color:var(--muted)">${getFlag(match.t2)}</span>
        </div>
        <div class="pred-for">
          <select id="pmem-${match.id}"><option value="">— اختر العضو —</option>${memberOpts}</select>
          <button class="pred-btn" onclick="savePred(${match.id})">⚡ حفظ التوقع</button>
        </div>
      </div>` : '';

    return`<div class="mc">
      <div class="mc-head">
        <span>${fmtDate(match.date)} • ${fmtMatchTime(match)}</span>
        ${match.group?`<span class="group-tag">م ${match.group}</span>`:''}
        <span class="phase-tag">${match.phase}</span>
      </div>
      <div class="mc-teams">
        <div class="tside"><div class="tflag">${getFlag(match.t1)}</div><div class="tname">${match.t1}</div></div>
        <div class="vs-box">${scoreBox}</div>
        <div class="tside"><div class="tflag">${getFlag(match.t2)}</div><div class="tname">${match.t2}</div></div>
      </div>
      ${countdownBar}
      ${predSection}
      ${preds.length?`<div class="plist"><div class="plist-title">📋 توقعات (${preds.length})</div>${predRows}</div>`:''}
      ${resSection}
    </div>`;
  }).join('');

  // تشغيل عداد تلقائي للتحديث كل ثانية
  if(window._cdTimer) clearInterval(window._cdTimer);
  window._cdTimer = setInterval(()=>{
    MATCHES.forEach(match=>{
      const el = document.getElementById('cd-'+match.id);
      if(!el) return;
      const cd = getCountdown(match);
      if(cd <= 0){
        el.className = 'countdown-closed';
        el.textContent = '🔒 أُغلق باب التخمين — المباراة بدأت';
        clearInterval(window._cdTimer);
        renderMatches(); // أعد الرسم لإخفاء نموذج التخمين
      } else {
        const cls = cd < 3600000 ? 'countdown-soon' : 'countdown-open';
        el.className = cls;
        el.textContent = `⏱️ يُغلق التخمين بعد: ${formatCountdown(cd)}`;
      }
    });
  }, 1000);
}

// ============================================================
// RENDER — SETUP STATUS
// ============================================================
// RENDER ALL
// ============================================================
function renderAll(){
  recalcPoints();
  renderLeaderboard();
  renderMembers();
  renderMatches();
  // حدّث زر الأدمن
  const ab = document.getElementById('admin-btn');
  if(ab) ab.textContent = isAdmin ? '🔓 أدمن (مفعّل)' : '🔐 أدمن';
}

// ============================================================
// INIT
// ============================================================
async function init(){
  await cloudLoad();
  recalcPoints(); renderAll();
  startRealtimeSync();
  startAutoRefresh();
}
init();
</script>
